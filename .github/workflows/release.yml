name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub release
      packages: write    # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Potions & Lotions v${{ steps.version.outputs.version }}"
          body: |
            ## Potions & Lotions v${{ steps.version.outputs.version }}

            ### Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ### Quick Start with Docker Compose

            ```yaml
            services:
              app:
                image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                ports:
                  - "3000:3000"
                environment:
                  DATABASE_URL: postgresql://oils:oils@db:5432/oils
                  NEXT_PUBLIC_BASE_URL: http://localhost:3000
                depends_on:
                  db:
                    condition: service_healthy
              db:
                image: postgres:16-alpine
                environment:
                  POSTGRES_USER: oils
                  POSTGRES_PASSWORD: oils
                  POSTGRES_DB: oils
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U oils"]
                  interval: 5s
                  retries: 5
            ```

            After starting, run migrations and seed:
            ```bash
            docker compose exec app npx prisma migrate deploy
            docker compose exec app npx tsx scripts/seed.ts
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
          generate_release_notes: true
