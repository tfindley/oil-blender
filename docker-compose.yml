services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oils}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oils}
      POSTGRES_DB: ${POSTGRES_DB:-oils}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oils}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/tfindley/oil-blender:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://oils:oils@postgres:5432/oils}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Oil Blender}
      ADMIN_SECRET: ${ADMIN_SECRET}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
